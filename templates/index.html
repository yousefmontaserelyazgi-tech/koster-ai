<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSTER AI | كوستر</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: white; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #1e293b; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; border-bottom: 3px solid #38bdf8; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 15px; line-height: 1.5; }
        .bot { background: #1e293b; align-self: flex-start; border: 1px solid #334155; }
        .user { background: #38bdf8; color: #0f172a; align-self: flex-end; font-weight: bold; }
        .input-area { padding: 20px; background: #1e293b; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; outline: none; }
        button { background: #38bdf8; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">🤖 كـوسـتـر AI</div>
    <div id="chat-box">
        <div class="msg bot">مرحباً يوسف! أنا كوستر، كيف أساعدك اليوم؟</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">إرسال 🚀</button>
    </div>

    <script>
        async function send() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat-box');
            if(!input.value.trim()) return;

            const text = input.value;
            chat.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: text})
                });
                const data = await res.json();
                chat.innerHTML += `<div class="msg bot">${data.response}</div>`;
            } catch(e) {
                chat.innerHTML += `<div class="msg bot">❌ فشل الاتصال بالسيرفر.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
