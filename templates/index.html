<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSTER AI | كـوسـتـر</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        .header { background: linear-gradient(90deg, #1e293b, #334155); padding: 20px; text-align: center; font-size: 24px; font-weight: bold; border-bottom: 2px solid #38bdf8; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 18px; border-radius: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background-color: #38bdf8; color: #0f172a; font-weight: 500; }
        .bot { align-self: flex-start; background-color: #1e293b; border: 1px solid #334155; }
        .input-area { padding: 20px; background-color: #1e293b; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; outline: none; font-size: 16px; }
        button { background-color: #38bdf8; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">🤖 KOSTER AI - الذاكرة الأزلية</div>
    <div class="chat-container" id="chat">
        <div class="message bot">أهلاً بك يا يوسف! أنا كوستر، ذاكرتي الآن أصبحت سحابية ولا أنسى شيئاً. كيف أساعدك اليوم؟</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="اكتب رسالتك هنا بأس لغة..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            if(!input.value.strip) return;

            // إضافة رسالة المستخدم
            chat.innerHTML += `<div class="message user">${input.value}</div>`;
            const text = input.value;
            input.value = '';

            // إرسال للسيرفر (قريباً سنربطها بـ Groq)
            chat.innerHTML += `<div class="message bot">تم استلام رسالتك.. النظام قيد التفعيل النهائي!</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
