<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSTER AI | كوستر</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #1e293b; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; color: #38bdf8; border-bottom: 2px solid #38bdf8; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 16px; line-height: 1.4; }
        .bot { background: #1e293b; align-self: flex-start; border: 1px solid #334155; }
        .user { background: #38bdf8; color: #0f172a; align-self: flex-end; font-weight: bold; }
        .input-area { background: #1e293b; padding: 20px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: none; outline: none; background: #334155; color: white; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">🤖 KOSTER AI - كوستر</div>
    <div id="chat-container">
        <div class="message bot">أهلاً بك يا يوسف! أنا كوستر، كيف يمكنني مساعدتك اليوم؟</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="اكتب رسالتك هنا..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">إرسال 🚀</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const container = document.getElementById('chat-container');
            if (!input.value.trim()) return;

            const userText = input.value;
            container.innerHTML += `<div class="message user">${userText}</div>`;
            input.value = '';
            container.scrollTop = container.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userText })
                });
                const data = await response.json();
                container.innerHTML += `<div class="message bot">${data.response}</div>`;
            } catch (error) {
                container.innerHTML += `<div class="message bot">❌ عذراً، حدث خطأ في الاتصال.</div>`;
            }
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
