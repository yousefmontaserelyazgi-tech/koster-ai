<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSTER AI | الواجهة الذهبية</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; color: #e2e8f0; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        .header { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 20px; text-align: center; font-size: 24px; font-weight: bold; border-bottom: 2px solid #38bdf8; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 10;}
        .header span { color: #38bdf8; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 15px 20px; border-radius: 20px; font-size: 16px; line-height: 1.5; animation: fadeIn 0.3s ease; word-wrap: break-word;}
        .bot { background-color: #1e293b; color: #e2e8f0; align-self: flex-start; border-bottom-right-radius: 0; border: 1px solid #334155; }
        .user { background-color: #38bdf8; color: #0f172a; align-self: flex-end; border-bottom-left-radius: 0; font-weight: 600; box-shadow: 0 4px 10px rgba(56, 189, 248, 0.2); }
        .input-area { padding: 15px; background-color: #1e293b; display: flex; gap: 10px; border-top: 1px solid #334155; }
        input { flex: 1; padding: 15px; border-radius: 25px; border: 1px solid #475569; background-color: #0f172a; color: white; font-size: 16px; outline: none; transition: border 0.3s; }
        input:focus { border-color: #38bdf8; }
        button { background: linear-gradient(135deg, #38bdf8, #0ea5e9); color: white; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-size: 16px; font-weight: bold; transition: transform 0.2s; }
        button:active { transform: scale(0.95); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">🤖 <span>KOSTER</span> AI</div>

    <div id="chat-box">
        <div class="msg bot">أهلاً بك يا بطل! أنا كوستر، الواجهة الذهبية تعمل الآن بنجاح. كيف يمكنني مساعدتك؟</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="اكتب رسالتك هنا..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">إرسال 🚀</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chat-box');
            const message = input.value.trim();
            
            if (!message) return;

            // إظهار رسالة المستخدم
            chatBox.innerHTML += `<div class="msg user">${message}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // إظهار رسالة جاري التفكير
            const loadingId = 'loading-' + Date.now();
            chatBox.innerHTML += `<div id="${loadingId}" class="msg bot">جاري التفكير... ⏳</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            // إرسال الطلب للسيرفر
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                
                // إزالة رسالة الانتظار ووضع الرد
                document.getElementById(loadingId).remove();
                chatBox.innerHTML += `<div class="msg bot">${data.response || "تم الإرسال بنجاح! تحتاج الآن فقط لربط عقلي بـ Groq في app.py"}</div>`;
            } catch (error) {
                document.getElementById(loadingId).innerHTML = "❌ عذراً، يجب إعداد مسار الدردشة في ملف app.py";
            }
            
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
    </html>
