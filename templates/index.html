<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSTER AI | كوستر</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        .header { background: #1e293b; padding: 20px; text-align: center; font-size: 20px; border-bottom: 2px solid #38bdf8; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 10px; max-width: 80%; }
        .bot { background: #1e293b; align-self: flex-start; }
        .user { background: #38bdf8; color: #0f172a; align-self: flex-end; }
        .input-box { padding: 20px; background: #1e293b; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; }
        button { background: #38bdf8; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">🤖 KOSTER AI - الذاكرة الأزلية</div>
    <div id="chat">
        <div class="msg bot">مرحباً يوسف! أنا كوستر، كيف أساعدك اليوم؟</div>
    </div>
    <div class="input-box">
        <input type="text" id="userInput" placeholder="اكتب رسالتك...">
        <button onclick="send()">إرسال</button>
    </div>
    <script>
        function send() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            if(!input.value) return;
            chat.innerHTML += `<div class="msg user">${input.value}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
