<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSTER AI | الذكاء الفائق</title>
    <style>
        :root { --accent: #38bdf8; --bg: #0f172a; --panel: #1e293b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: var(--panel); padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); }
        .header h1 { margin: 0; font-size: 24px; color: var(--accent); text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        #chat-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 85%; padding: 15px 20px; border-radius: 15px; line-height: 1.8; font-size: 16px; white-space: pre-wrap; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bot { background: var(--panel); align-self: flex-start; border-right: 4px solid var(--accent); }
        .user { background: var(--accent); color: #0f172a; align-self: flex-end; font-weight: bold; }
        .input-area { background: var(--panel); padding: 20px; display: flex; gap: 10px; }
        input { flex: 1; padding: 14px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; }
        button { background: var(--accent); color: #0f172a; border: none; padding: 10px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        b, strong { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>
    <div class="header"><h1>🤖 كـوسـتـر AI - النسخة الفائقة</h1></div>
    <div id="chat-box">
        <div class="msg bot">أهلاً بك يا يوسف. نظام كوستر الفائق متصل الآن وجاهز لتحليل البيانات وتقديم استشارات تقنية عميقة. ماذا يدور في ذهنك؟</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="اكتب رسالتك هنا..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">إرسال 🚀</button>
    </div>
    <script>
        async function send() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('chat-box');
            if(!input.value.trim()) return;
            const val = input.value;
            box.innerHTML += `<div class="msg user">${val}</div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: val})
                });
                const data = await res.json();
                // تحويل العلامات (**) إلى خط عريض تلقائياً
                let text = data.response.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                box.innerHTML += `<div class="msg bot">${text}</div>`;
            } catch(e) { box.innerHTML += `<div class="msg bot">خطأ في الاتصال بالسيرفر.</div>`; }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
