<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSTER AI | النسخة الاحترافية</title>
    <style>
        /* هون رجعنا الألوان اللي تعبنا عليها */
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            background: var(--panel);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .header h1 { margin: 0; color: var(--accent); font-size: 24px; letter-spacing: 2px; }
        
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }
        
        .bubble {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .bot { background: var(--panel); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #334155; }
        .user { background: var(--accent); color: var(--bg); align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 600; }
        
        .input-box {
            background: var(--panel);
            padding: 25px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #334155;
        }
        input {
            flex: 1;
            background: #334155;
            border: 2px solid transparent;
            padding: 12px;
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); }
        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 0 25px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { transform: scale(1.05); filter: brightness(1.1); }
    </style>
</head>
<body>
    <div class="header"><h1>KOSTER AI</h1></div>
    <div id="chat-window">
        <div class="bubble bot">أهلاً يا يوسف! تعبنا ما ضاع، شوف التصميم كيف صار هلقيت.. كيف بقدر أساعدك؟</div>
    </div>
    <div class="input-box">
        <input type="text" id="msg" placeholder="اكتب رسالتك الذكية..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">إرسال</button>
    </div>

    <script>
        async function send() {
            const i = document.getElementById('msg');
            const w = document.getElementById('chat-window');
            if(!i.value.trim()) return;
            
            const txt = i.value;
            w.innerHTML += `<div class="bubble user">${txt}</div>`;
            i.value = '';
            w.scrollTop = w.scrollHeight;

            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: txt})
            });
            const data = await res.json();
            w.innerHTML += `<div class="bubble bot">${data.response}</div>`;
            w.scrollTop = w.scrollHeight;
        }
    </script>
</body>
</html>
